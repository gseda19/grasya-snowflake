
version: 2

models:
    - name: my_first_dbt_model
      description: "A starter dbt model"
      columns:
          - name: id
            description: "The primary key for this table"
          - name: user_type
            description: Categorizes the user based on their role or level of access within the system (e.g., admin, broker, staff).
            data_tests:
              - accepted_values:
                  values:
                    - "admin"

    - name: my_second_dbt_model
      description: "A starter dbt model"
      columns:
          - name: id
            description: "The primary key for this table"
            tests:
                - unique
                - not_null

    
